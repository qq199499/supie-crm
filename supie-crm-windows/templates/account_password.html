{% extends "base.html" %}
{% block content %}
<div class="crm-page-head">
  <div class="crm-page-head-main">
    <h4 class="crm-page-title">修改密码</h4>
    <div class="crm-page-subtitle">修改当前账号密码，保存后重新登录生效。</div>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="modern-card crm-content-card table-shell">
      <div class="card-header">修改密码</div>
      <div class="card-body">
        <form method="post" class="row g-3">
          <div class="col-12">
            <label class="form-label">原密码</label>
            <input type="password" name="old_password" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label">新密码</label>
            <input type="password" name="new_password" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label">确认新密码</label>
            <input type="password" name="confirm_password" class="form-control" required>
          </div>
          <div class="col-12">
            <button class="btn btn-primary">保存新密码</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
