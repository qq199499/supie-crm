<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 项目过程管理系统</title>
    <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
    <style>
      :root {
        --line: #dbe8f2;
        --text-muted: #64748b;
        --primary: #2f8cad;
        --primary-deep: #1f6f97;
        --font-base: 15px;
        --font-sm: 14px;
        --font-xs: 13px;
        --line-height-body: 1.55;
      }
      html {
        font-size: var(--font-base);
      }
      body.login-page {
        margin: 0;
        min-height: 100vh;
        color: #0f172a;
        line-height: var(--line-height-body);
        -webkit-font-smoothing: antialiased;
        position: relative;
        overflow-x: hidden;
      }
      .small,
      small {
        font-size: var(--font-sm) !important;
      }

      /* 动态背景层 */
      .login-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background: linear-gradient(125deg, #c5e4ef, #e8f4f8, #b8ddea, #dceef5, #a8d4e6);
        background-size: 400% 400%;
        animation: login-bg-mesh 20s ease infinite;
      }
      @keyframes login-bg-mesh {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .login-bg-shine {
        position: absolute;
        inset: -20%;
        background:
          radial-gradient(ellipse 80% 60% at 20% 30%, rgba(47, 140, 173, 0.55) 0%, transparent 55%),
          radial-gradient(ellipse 70% 50% at 80% 75%, rgba(31, 111, 151, 0.4) 0%, transparent 50%),
          radial-gradient(ellipse 50% 40% at 60% 20%, rgba(255, 255, 255, 0.35) 0%, transparent 45%);
        animation: login-bg-shine 16s ease-in-out infinite alternate;
      }
      @keyframes login-bg-shine {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        100% { transform: translate(-3%, 2%) scale(1.08); opacity: 0.92; }
      }
      .login-bg-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        pointer-events: none;
      }
      .login-bg-orb1 {
        width: min(52vmin, 420px);
        height: min(52vmin, 420px);
        background: rgba(47, 140, 173, 0.55);
        top: -12%;
        left: -8%;
        animation: login-orb-a 22s ease-in-out infinite;
      }
      .login-bg-orb2 {
        width: min(44vmin, 360px);
        height: min(44vmin, 360px);
        background: rgba(126, 184, 206, 0.5);
        bottom: -5%;
        right: -10%;
        animation: login-orb-b 18s ease-in-out infinite;
      }
      .login-bg-orb3 {
        width: min(36vmin, 300px);
        height: min(36vmin, 300px);
        background: rgba(255, 255, 255, 0.45);
        top: 40%;
        left: 45%;
        animation: login-orb-c 14s ease-in-out infinite;
      }
      @keyframes login-orb-a {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(8vw, 6vh); }
      }
      @keyframes login-orb-b {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-6vw, -4vh); }
      }
      @keyframes login-orb-c {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-48%, -52%) scale(1.15); opacity: 0.85; }
      }

      .login-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem 2.5rem;
        gap: 1.5rem;
      }
      .login-page-title {
        margin: 0;
        text-align: center;
        font-size: clamp(1.5rem, 4.5vw, 2.15rem);
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #0c2d3d;
        text-shadow:
          0 0 24px rgba(255, 255, 255, 0.85),
          0 2px 12px rgba(255, 255, 255, 0.6),
          0 1px 2px rgba(47, 140, 173, 0.25);
      }

      .login-card {
        width: 100%;
        max-width: 440px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(219, 232, 242, 0.95);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 48px rgba(15, 23, 42, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        backdrop-filter: blur(12px);
      }
      .btn-login {
        background: linear-gradient(90deg, var(--primary) 0%, var(--primary-deep) 100%);
        border: none;
        box-shadow: 0 10px 22px rgba(47, 140, 173, 0.2);
      }
      .btn-login:hover { filter: brightness(.97); }
      @media (prefers-reduced-motion: reduce) {
        .login-bg,
        .login-bg-shine,
        .login-bg-orb1,
        .login-bg-orb2,
        .login-bg-orb3 {
          animation: none !important;
        }
        .login-bg {
          background-position: 50% 50%;
        }
      }

      .login-captcha-box {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: 0.35em;
        padding: 0.5rem 1rem;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #f8fbff 0%, #eef6fb 100%);
        color: #1f3b4a;
        user-select: none;
        display: inline-block;
      }
    </style>
  </head>
  <body class="login-page">
    <div class="login-bg" aria-hidden="true">
      <div class="login-bg-shine"></div>
      <div class="login-bg-orb login-bg-orb1"></div>
      <div class="login-bg-orb login-bg-orb2"></div>
      <div class="login-bg-orb login-bg-orb3"></div>
    </div>

    <div class="login-shell">
      <h1 class="login-page-title">项目过程管理系统</h1>
      <div class="login-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-2">
          {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 mb-2">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        <form method="post" class="row g-3" autocomplete="off">
          <div class="col-12">
            <label class="form-label">账号</label>
            <input class="form-control" name="username" required autocomplete="username">
          </div>
          <div class="col-12">
            <label class="form-label">密码</label>
            <input type="password" class="form-control" name="password" required autocomplete="current-password">
          </div>
          <div class="col-12">
            <label class="form-label">验证码</label>
            <div class="mb-2">
              <span class="login-captcha-box" title="请在下框输入相同字符">{{ captcha_display }}</span>
            </div>
            <input type="text" class="form-control" name="captcha_input" maxlength="6" required placeholder="请输入上方验证码（不区分大小写）" autocomplete="off" inputmode="text" autocorrect="off" spellcheck="false">
          </div>
          <div class="col-12">
            <button class="btn btn-login text-white w-100">登录</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
